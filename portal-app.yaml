# portal-app.yaml - Manifest fuer Health Portal Apps

name: Wissensmanagement
version: 2.0.0
description: Wissensmanagement-App mit Wissensdatenbank, Artikelverwaltung und Volltextsuche

dockerfile: Dockerfile

port: 8080

env:
  DB_HOST: portal-db
  DB_PORT: "5432"
  DB_NAME: wissensmanagement
  DB_USERNAME: portal
  DB_PASSWORD: portal

healthCheck: /api/artikel/statistik

useCases:
  - key: wissensmanagement-lesen
    label: "Wissensmanagement - Lesen"
    beschreibung: "Lesezugriff auf die Wissensdatenbank"
  - key: wissensmanagement-verwalten
    label: "Wissensmanagement - Verwalten"
    beschreibung: "Artikel erstellen, bearbeiten und loeschen"
