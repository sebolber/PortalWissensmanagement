server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:wissensmanagement;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    de.wissensmanagement: INFO
